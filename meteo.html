<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Stacja Pogodowa ESP32-S2</title>
    <script src="chart_library.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .station { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #333; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .block { margin-bottom: 30px; }
        .label { font-size: 0.9em; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 3.5em; font-weight: bold; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .unit { font-size: 0.4em; color: #555; margin-left: 5px; }
        .trend { font-size: 1.5em; font-weight: bold; }
        .up { color: #ff3366; }    /* Czerwony dla wzrostu temp / Zielony dla ciśnienia */
        .down { color: #3399ff; }  /* Niebieski dla spadku */
        .stable { color: #888; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

<div class="station">
    <div class="block">
        <div class="label">Temperatura</div>
        <div id="temp" class="value">--<span class="unit">°C</span></div>
        <div id="temp-trend" class="trend stable">--</div>
    </div>
    
    <hr>

    <div class="block">
        <div class="label">Ciśnienie</div>
        <div id="press" class="value">----<span class="unit">hPa</span></div>
        <div id="press-trend" class="trend stable">--</div>
    </div>
</div>

<script>
async function updateStation() {
    try {
        const res = await fetch('history.csv');
        const text = await res.text();
        const rows = text.trim().split('\n');
        if (rows.length < 2) return;

        const data = rows.map(r => r.split(','));
        const last = data[data.length - 1];
        
        // --- TEMPERATURA ---
        const currentTemp = parseFloat(last[1]);
        document.getElementById('temp').innerHTML = `${currentTemp.toFixed(1)}<span class="unit">°C</span>`;
        
        // Trend Temp (porównanie z odczytem sprzed 1h = 4 wpisy)
        const prevTemp = parseFloat(data[Math.max(0, data.length - 5)][1]);
        setTrend('temp-trend', currentTemp - prevTemp, 0.2);

        // --- CIŚNIENIE ---
        const currentPress = parseFloat(last[2]);
        document.getElementById('press').innerHTML = `${Math.round(currentPress)}<span class="unit">hPa</span>`;
        
        // Trend Ciśnienia (porównanie z odczytem sprzed 3h = 12 wpisów)
        const prevPress = parseFloat(data[Math.max(0, data.length - 13)][2]);
        setTrend('press-trend', currentPress - prevPress, 0.5);

    } catch (e) { console.error("Błąd danych", e); }
}

function setTrend(id, diff, threshold) {
    const el = document.getElementById(id);
    if (diff > threshold) {
        el.innerHTML = "▲ ROSNIE";
        el.className = "trend up";
    } else if (diff < -threshold) {
        el.innerHTML = "▼ SPADA";
        el.className = "trend down";
    } else {
        el.innerHTML = "━ STABILNE";
        el.className = "trend stable";
    }
}

updateStation();
setInterval(updateStation, 30000); // Odświeżaj co 30 sek.
</script>

</body>
</html>
